apiVersion: v1
kind: Pod
metadata:
  name: secert-pod

spec:
  restartPolicy: Never
  containers:
    - name: busybox
      image: busybox
      command:
        - sh
        - -c
        - |
          echo "DB_USER=$DB_USER"
          echo "Secert files:"
          ls /etc/db-credentials
          sleep 3600

      env:
        - name: DB_USER
          valueFrom:
            secretKeyRef:
              name: db-credentials
              key: DB_USER

      volumeMounts:
        - name: secret-volume
          mountPath: /etc/db-credentials
          readOnly: true

  volumes:
    - name: secret-volume
      secret:
        secretName: db-credentials
